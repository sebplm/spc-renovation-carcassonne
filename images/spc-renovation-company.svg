<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- Diagonal accent -->
  <polygon points="0,380 400,260 400,500 0,500" fill="rgba(255,255,255,0.05)"/>
  <!-- Building icon -->
  <g transform="translate(120, 80)">
    <!-- Main building -->
    <rect x="20" y="60" width="120" height="110" fill="rgba(255,255,255,0.15)" rx="4"/>
    <!-- Roof -->
    <polygon points="80,10 160,60 0,60" fill="rgba(255,255,255,0.25)"/>
    <!-- Windows row 1 -->
    <rect x="35" y="80" width="25" height="25" fill="rgba(255,165,0,0.7)" rx="2"/>
    <rect x="70" y="80" width="25" height="25" fill="rgba(255,165,0,0.7)" rx="2"/>
    <rect x="105" y="80" width="25" height="25" fill="rgba(255,165,0,0.5)" rx="2"/>
    <!-- Windows row 2 -->
    <rect x="35" y="115" width="25" height="25" fill="rgba(255,165,0,0.5)" rx="2"/>
    <rect x="70" y="115" width="25" height="25" fill="rgba(255,165,0,0.7)" rx="2"/>
    <rect x="105" y="115" width="25" height="25" fill="rgba(255,165,0,0.5)" rx="2"/>
    <!-- Door -->
    <rect x="63" y="140" width="34" height="30" fill="rgba(255,255,255,0.3)" rx="3"/>
    <!-- Crane -->
    <rect x="145" y="20" width="6" height="90" fill="rgba(255,165,0,0.8)"/>
    <rect x="100" y="20" width="51" height="6" fill="rgba(255,165,0,0.8)"/>
    <line x1="148" y1="26" x2="148" y2="70" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <rect x="142" y="65" width="12" height="12" fill="rgba(255,165,0,0.6)" rx="1"/>
  </g>
  <!-- Company name -->
  <text x="200" y="310" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle" letter-spacing="2">SPC</text>
  <text x="200" y="358" font-family="Arial Black, Arial, sans-serif" font-size="24" font-weight="900" fill="rgba(255,165,0,1)" text-anchor="middle" letter-spacing="3">RENOVATION</text>
  <!-- Separator -->
  <rect x="140" y="372" width="120" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>
  <!-- Location -->
  <text x="200" y="400" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="2">CARCASSONNE</text>
  <text x="200" y="425" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">Artisan multi-services</text>
  <!-- Bottom stars -->
  <text x="200" y="460" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,165,0,0.8)" text-anchor="middle">★ ★ ★ ★ ★</text>
</svg>
