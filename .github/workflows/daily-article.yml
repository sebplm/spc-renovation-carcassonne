name: "Article du jour — SPC RENOVATION"

on:
  schedule:
    # 9h Paris : UTC+2 en été → 7h UTC | UTC+1 en hiver → 8h UTC
    # On choisit 7h UTC (= 9h CEST / 8h CET)
    - cron: "0 7 * * *"
  workflow_dispatch:
    # Permet de déclencher manuellement depuis l'onglet Actions sur GitHub

permissions:
  contents: write

jobs:
  publish:
    name: Générer et publier l'article
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Installer les dépendances
        run: pip install -r scripts/requirements.txt

      - name: Générer et publier l'article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate-article.py

      - name: Sauvegarder les logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: scripts/logs/
          retention-days: 30
